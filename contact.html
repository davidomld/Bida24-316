<!-- contact.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Gemmes et Bijoux</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="bg-dark text-white p-3">
    <div class="container">
      <h1 class="mb-0">Gemmes et Bijoux</h1>
      <nav class="mt-3">
        <ul class="nav">
          <li class="nav-item"><a class="nav-link text-white" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="about.html">About Us</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="collections.html">Collections</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="testimonials.html">Testimonials</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main class="container my-5">
    <h2>Contact Us</h2>
    <form action="#" method="post">
      <div class="mb-3">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" class="form-control">
      </div>
      <div class="mb-3">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" class="form-control">
      </div>
      <div class="mb-3">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" class="form-control"></textarea>
      </div>
      <input type="submit" value="Send" class="btn btn-dark">
    </form>
  </main>
  <footer class="bg-light text-center p-3">
    <p>&copy; 2025 Gemmes et Bijoux</p>
  </footer>
</body>
</html>
